<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Youth Retreat Scanner</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>QR Scanner</h1>

        <div id="reader"></div>

        <br>

        <div id="status">
            Ready...
        </div>

        <button id="nextBtn"
                onclick="startScanner()"
                style="display:none;margin-top:15px;width:100%;padding:14px;font-size:18px;font-weight:bold;background:#f7b500;color:#111;border:none;border-radius:8px;cursor:pointer;">
            Scan Next Ticket
        </button>

    </div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/scanner.js"></script>

</body>

</html>

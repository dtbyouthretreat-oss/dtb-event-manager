<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Youth Retreat Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>👑 Youth Retreat #2K26 Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2 id="registered">0</h2>
            <span>Registered</span>
        </div>

        <div class="card">
            <h2 id="approved">0</h2>
            <span>Approved</span>
        </div>

        <div class="card">
            <h2 id="pending">0</h2>
            <span>Pending</span>
        </div>

        <div class="card">
            <h2 id="rejected">0</h2>
            <span>Rejected</span>
        </div>

        <div class="card">
            <h2 id="checkedIn">0</h2>
            <span>Checked In</span>
        </div>

    </div>

    <div class="recent">

        <h2>Recent Activity</h2>

        <ul id="recentList"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
